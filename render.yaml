# Render Blueprint — FastAPI 백엔드
# Dashboard: New > Blueprint > 이 저장소 연결

services:
  - type: web
    name: farmguard-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEMO_MODE
        value: "false"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./farmguard.db
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
      - key: NONGSARO_API_KEY
        sync: false
      - key: NCPMS_API_KEY
        sync: false
